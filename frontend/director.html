<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director · MovieDB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50">

    <!-- Navigation Bar -->
    <nav class="bg-gray-900 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <i class="fas fa-film text-yellow-400 text-2xl"></i>
                <a href="index.html" class="text-xl font-bold tracking-wide hover:text-yellow-400 transition">MovieDB</a>
            </div>
            <div class="hidden md:flex space-x-8">
                <a href="index.html" class="hover:text-yellow-400 transition font-medium">Home</a>
                <a href="stats.html" class="hover:text-yellow-400 transition font-medium">Statistics</a>
            </div>
            <div class="md:hidden">
                <button id="mobile-menu-btn" class="focus:outline-none">
                    <i class="fas fa-bars text-2xl"></i>
                </button>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-gray-800 px-4 pb-4 space-y-2">
            <a href="index.html" class="block py-2 hover:text-yellow-400">Home</a>
            <a href="stats.html" class="block py-2 hover:text-yellow-400">Statistics</a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div class="mb-6">
            <a href="javascript:history.back()" class="text-indigo-600 hover:text-indigo-800">
                <i class="fas fa-arrow-left mr-1"></i>Back
            </a>
        </div>
        <div id="director-info" class="bg-white rounded-xl shadow-md p-6 mb-8"></div>
        <h2 class="text-2xl font-bold mb-6 text-gray-800">🎬 Directed Movies</h2>
        <div id="movies-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5"></div>
        <div id="loading" class="text-center py-12 hidden">
            <i class="fas fa-circle-notch fa-spin text-4xl text-indigo-500"></i>
        </div>
    </main>

    <footer class="bg-gray-100 border-t border-gray-200 mt-12 py-8">
        <div class="container mx-auto px-4 text-center text-gray-600">
            <p>© 2026 MovieDB · Movie Database Project</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/director.js"></script>
    <script>
        document.getElementById('mobile-menu-btn')?.addEventListener('click', function() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });
    </script>
</body>
</html>
